<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens Dinâmicas</title>
    
</head>
<body>
    <h1>Trabalhando com imagens dinâmicas</h1>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/fotop.png" type="image/png">
        <source media="(max-width: 1050px )" srcset="imagens/fotom.png" type="image/png">
       <img src="imagens/fotog.png" alt="imagen flexível">
    </picture>
    <h1>Reproduzindo áudio</h1>
    <h2>Vamos aprender a reproduzir áudios</h2>
    <audio preload="metadata" autoplay controls><!-- se quiser um loop use a tag loop -->
        <source src="midia/happy-mistake.mp3" type="audio/mpeg">
         <source src="midia/happy-mistake.mp3" type="audio/ogg">
         <source src="midia/happy-mistake.mp3" type="audio/wav">
         <p>Infelizmente não foi possível reproduzir o áudio :/ <br>Clique <a href="midia/happy-mistake.mp3">aqui</a> para baixar o áudio</p>
    </audio> 

</body>
</html>
