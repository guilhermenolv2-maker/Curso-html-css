<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizando links</title>
    <style>
        a{
            color: crimson;
            text-decoration: none;
        }
        a:visited{
            color: aqua;
        }
        a:hover{
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Trabalhando com personalização de links</h1>
    <ul>
        <li><a href="https://instagram.com/guiihermenunes9">Instagram</a></li>
    </ul>
    
</body>
</html>
