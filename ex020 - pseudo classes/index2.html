<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psuedo class</title>
    <style>
        div > p {
            display: none;
        }
        div:hover > p{
            display: block;
           background-color: blue;
        }
        div:hover {
            color: chartreuse;
        }
    
    </style>
</head>

<body>
    <div>
        Opção I
    </div>
    <div>
        Opção II
        <p>Opção escondida</p>
    </div>
    <div>
        Opção III
    </div>
</body>

</html>
