<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo class</title>
    <style>
        div{
            border-style: solid;
            height: 200px;
            width: 200px;
            text-align: center;
            background-color: bisque;
        }
    
        div:hover{
            background-color: aqua;
        }


    </style>
</head>
<body>
    <h1>Trabalhando com pseudo class</h1>
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03</div>
</body>
</html>
