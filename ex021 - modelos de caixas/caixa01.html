<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de caixas</title>
    <style>
        h1{
            width: 350px;
            height: 350px;
            background-color: rgb(0, 120, 120);
            border-style: solid;
            border-color: black;
            border-width: 20px;
            padding-left: 10px;
        }
        a{
            border-style: solid;
            border-color: brown;
            padding-left: 5px;
            padding-right: 5px;
        }
    </style>
</head>
<body>
    <h1>Modelos de caixas box-level</h1>
    <p>Paragráfos também são exemplos de box-level, mas os <a href="">links são exemplos de caixas inline-level</a> vamos ver como tudo isso funciona</p>
    
</body>
</html>
