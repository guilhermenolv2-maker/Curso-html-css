<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping tags</title>
</head>
<body>

    <div><!-- A mais comum. Serve para agrupar conteúdos -->
        <h1>Trabalhando com tags de organização</h1>
    </div>

    <header> <!-- Cabeçalho -->
    <h1>Meu Site</h1>
</header>

<nav> <!-- Área de navegação/menu -->
    <a href="#">Home</a>
    <a href="#">Contato</a>
</nav>

<aside> <!-- Conteúdo lateral -->
    <p>Publicidade</p>
</aside>

    <section> <!-- Cria uma seção do site -->
    <h2>Sobre nós</h2>
    <p>Texto da seção</p>
</section>

<article> <!-- Usada para conteúdos independentes -->
    <h2>Notícia</h2>
    <p>Conteúdo da notícia</p>
</article>

<main> <!-- Conteúdo principal da página -->
    <h1>Conteúdo principal</h1>
</main>

<footer> <!-- Rodapé -->
    <p>Todos os direitos reservados</p>
</footer>
    
</body>
</html>
