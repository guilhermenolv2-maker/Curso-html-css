<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com vídeos</title>
</head>
<body>
    <h1>Este vídeo esta ospedado e meu servidor</h1>
    <p>Aqui vai o vídeo</p>
    <video width="500px" height="500px" controls poster="imagem/thumb.png">
        <source src="videos/Videonovo.mp4" type="video/mp4">
        <source src="videos/Videonovo.ogv" type="video/ogv">
        <source src="videos/Videonovo.webm" type="video/webm">
        <p>Seu navegador não é compativel com o formato de vídeo <br>clique <a href="videos/Videonovo.mp4">aqui para fazer o download</a></p>
    </video>
    <h1>Inserindo vídeos do youtube</h1>
    <h2>Dessa maneira aqui, não tem consumo do seu servidor</h2>
    <iframe width="500" height="500" src="https://www.youtube.com/embed/EvAMUHZ3t5g?si=Set9NMDxgqxpjylY" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
