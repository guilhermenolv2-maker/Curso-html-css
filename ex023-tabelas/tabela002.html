<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Grande</title>
    <style>
        body{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        table{
            background-color: aliceblue;
            width: 400px;
            border-collapse: collapse;
        }
        th{
            background-color: rgb(203, 211, 218);;
        }
        td, th{
            border: 2px, solid, black;
            padding: 10px;
        }
        .num{
            text-align: right;
        }
        caption{
            text-align: center;
          
        }
        tbody > tr:nth-child(odd){
            background-color: azure;
        } tbody > tr:nth-child(even){
            background-color: rgb(97, 203, 203);
        }
    </style>
</head>
<body>
        <h1>Tabela Grande</h1>
    <table>
        <caption>População das Unidades Federativas</caption>

        <thead>
            <tr>
                <th scope="col">Estado</th>
                <th scope="col">População</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>São Paulo</td>
                <td class="num">45.919,49</td>
            </tr>
            <tr>
                <td>Minas Gerais</td>
                <td class="num">21 393 441	</td>
            </tr>
            <tr>
                <td>Rio de Janeiro</td>
                <td class="num">17 223 547</td>
            </tr>
            <tr>
                <td>Bahia</td>
                <td class="num">14 870 907</td>
            </tr>
            <tr>
                <td>Paraná</td>
                <td class="num">11 890 517</td>
            </tr>
            <tr>
                <td>Rio Grande do Sul</td>
                <td class="num">11 233 263</td>
            </tr>
            <tr>
                <td>Pernambuco</td>
                <td class="num">9 562 007</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th scope="row">Total de Habitantes</th>
                <td class="num">132 092 731</td>
            </th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
