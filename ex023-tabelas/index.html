<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com tabelas</title>
    <style>
        body{
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        table{
            width: 400px;
            border-collapse: collapse;
        }
        td{
            border: 2px, solid, black;
            padding: 5px;
        }
        .b3{
            background-color: yellowgreen;
        }
        #tabela{
            height: 200px;
        }
        .alinhada{
            text-align: center;
            vertical-align: top;
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <table>
        <tr>
            <td>A1</td>
            <td>A2</td>
            <td>A3</td>
        </tr>
        <tr>
            <td>B1</td>
            <td>B2</td>
            <td class="b3">B3</td>
        </tr>
        <tr>
            <td>C1</td>
            <td>C2</td>
            <td>C3</td>
        </tr>
    </table>
    <h2>Tabela Alinhada</h2>
    <table id="tabela">
        <tr class="alinhada">
            <td>A1</td>
            <td>A2</td>
            <td>A3</td>
        </tr>
        <tr class="alinhada">
            <td>B1</td>
            <td>B2</td>
            <td>B3</td>
        </tr>
        <tr class="alinhada">
            <td>C1</td>
            <td>C2</td>
            <td>C3</td>
        </tr>
    </table>
    
</body>
</html>
